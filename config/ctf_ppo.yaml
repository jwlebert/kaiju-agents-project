behaviors:
  Trooper:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1000000
    time_horizon: 64
    summary_freq: 10000

# For Curriculum training
environment_parameters:
  map_level:
    curriculum:
      - name: Lesson1_Tutorial
        completion_criteria:
          measure: reward
          behavior: Trooper
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.5    # When average reward hits 0.5, go to Lesson 2
        value: 1.0
      - name: Lesson2_Sprint
        completion_criteria:
          measure: reward
          behavior: Trooper
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.5    # When average reward hits 0.5, go to Lesson 3
        value: 2.0
      - name: Lesson3_Obstacles
        completion_criteria:
          measure: reward
          behavior: Trooper
          signal_smoothing: true
          min_lesson_length: 150 # Make them prove it a bit longer with walls
          threshold: 0.6
        value: 3.0
      - name: Lesson4_FullGame
        value: 4.0          # The final state