behaviors:
  Trooper:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1000000
    time_horizon: 64
    summary_freq: 10000

# For Curriculum training
  environment_parameters:
  enemy_count:
    curriculum:
      - name: Easy
        completion_criteria:
          measure: reward
          behavior: Trooper
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.3  # Advance when average reward hits 0.3
        value: 1.0        # Start with 1 enemy
      - name: Medium
        completion_criteria:
          measure: reward
          behavior: Trooper
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.5
        value: 5.0        # Scale to 5 enemies
      - name: Hard
        value: 11.0       # Final stage: all 11 enemies